# Dev stack — 1 container chạy client Vite (:8081) + Express mock API (:8000).
# Usage: docker compose up --build
services:
  web:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "8090:8081" # client (Vite dev server) — host:8090 (8081 đã bị project khác chiếm)
      - "8010:8000" # mock API — host:8010 (8000 đã bị project khác chiếm)
    volumes:
      - .:/app # mount source → hot reload
      - node_modules:/app/node_modules # giữ node_modules trong volume (không đè bằng host)
    environment:
      - CHOKIDAR_USEPOLLING=true # file-watch ổn định trên Docker Desktop (macOS)
    command: sh -c "pnpm install && pnpm dev:all"

volumes:
  node_modules:
