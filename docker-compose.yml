# Dev stack đầy đủ — web (Vite + Express API) + Postgres + migration.
# `docker compose up` chạy: db (healthy) → migrate (chạy xong) → web.
#
# include kéo service db + migrate từ docker-compose.db.yaml vào cùng project,
# nên web nối được tới `db` qua mạng nội bộ compose.
include:
  - docker-compose.db.yaml

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile.dev
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    ports:
      - "8090:8081" # client (Vite dev server) — host:8090 (8081 đã bị project khác chiếm)
      - "8010:8000" # API — host:8010 (8000 đã bị project khác chiếm)
    volumes:
      - .:/app # mount source → hot reload
      - node_modules:/app/node_modules # giữ node_modules trong volume (không đè bằng host)
    environment:
      - CHOKIDAR_USEPOLLING=true # file-watch ổn định trên Docker Desktop (macOS)
      - DATABASE_URL=postgres://wedding:wedding@db:5432/wedding
    command: sh -c "pnpm install && pnpm dev:all"

volumes:
  node_modules:
